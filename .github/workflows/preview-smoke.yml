name: Preview Smoke

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: Vercel preview URL
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: preview-smoke-${{ inputs.preview_url }}
  cancel-in-progress: true

jobs:
  smoke:
    if: >-
      github.actor == github.repository_owner &&
      github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          node-version: 24
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Validate trusted preview URL
        env:
          UI_SMOKE_BASE_URL: ${{ inputs.preview_url }}
        run: >-
          npx tsx -e "import { requireTrustedVercelPreviewUrl } from
          './src/lib/deployments/vercel-preview-auth';
          requireTrustedVercelPreviewUrl(process.env.UI_SMOKE_BASE_URL ?? '')"
      - name: Smoke trusted Vercel preview
        env:
          UI_SMOKE_BASE_URL: ${{ inputs.preview_url }}
          UI_SMOKE_ISOLATED_PROVIDERS: "true"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: test -n "$VERCEL_AUTOMATION_BYPASS_SECRET" && npm run ui:smoke
